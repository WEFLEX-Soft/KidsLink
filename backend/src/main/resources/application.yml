cloud:
    aws:
        credentials:
            access-key: ${AWS_ACCESS_KEY_ID:access_key}
            secret-key: ${AWS_SECRET_ACCESS_KEY:secret_key}
        region:
            static: ${AWS_REGION:ap-northeast-2}
        s3:
            bucket: ${CLOUD_AWS_S3_BUCKET:bucket_name}
        stack:
            auto: false
file:
    max-size: ${FILE_MAX_SIZE:542880}
    upload-dir: ${UPLOAD_DIR:C:/uploads}
frontend:
    server:
        url: ${FRONTEND_URL:http://localhost:5173}
logging:
    level:
        com:
            ssafy:
                kidslink: info
openvidu:
    recording: true
    recording.enabled: true
    recording.max-length: 3600
    recording.path: /opt/openvidu/recordings
    secret: MY_SECRET
    url: ${OPENVIDU_URL:http://localhost:4443/}
server:
    servlet:
        encoding:
            charset: UTF-8
            enabled: true
            force: true
    tomcat:
        uri-encoding: UTF-8
spring:
    application:
        name: KidsLink
    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:localhost}
            port: ${SPRING_DATA_REDIS_PORT:6379}
    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        password: ${SPRING_DATASOURCE_PASSWORD:ssafy}
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/kidslink?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
        username: ${SPRING_DATASOURCE_USERNAME:ssafy}
    jpa:
        hibernate:
            ddl-auto: none
            naming:
                physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect
    jwt:
        secret: ${SPRING_JWT_SECRET:bumsoosososososososossoossosososoososososossoo}
    profiles:
        active: ${SPRING_PROFILES_ACTIVE:dev}
    security:
        oauth2:
            client:
                provider:
                    kakao:
                        authorization-uri: https://kauth.kakao.com/oauth/authorize
                        token-uri: https://kauth.kakao.com/oauth/token
                        user-info-uri: https://kapi.kakao.com/v2/user/me
                        user-name-attribute: id
                    naver:
                        authorization-uri: https://nid.naver.com/oauth2.0/authorize
                        token-uri: https://nid.naver.com/oauth2.0/token
                        user-info-uri: https://openapi.naver.com/v1/nid/me
                        user-name-attribute: response
                registration:
                    google:
                        authorization-grant-type: authorization_code
                        client-id: ${OAUTH2_GOOGLE_CLIENT_ID}
                        client-name: ${OAUTH2_GOOGLE_CLIENT_NAME}
                        client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET}
                        scope: profile,email
                    kakao:
                        authorization-grant-type: authorization_code
                        client-authentication-method: client_secret_post
                        client-id: ${OAUTH2_KAKAO_CLIENT_ID}
                        client-name: ${OAUTH2_KAKAO_CLIENT_NAME}
                        client-secret: ${OAUTH2_KAKAO_CLIENT_SECRET}
                        scope: account_email
                    naver:
                        authorization-grant-type: authorization_code
                        client-id: ${OAUTH2_NAVER_CLIENT_ID}
                        client-name: ${OAUTH2_NAVER_CLIENT_NAME}
                        client-secret: ${OAUTH2_NAVER_CLIENT_SECRET}
                        scope: name,email
    servlet:
        multipart:
            max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
            max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:200MB}
use:
    s3: ${USE_S3:false}
